{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Manage Badges</h2>
        <a href="{{ url_for('add_badge') }}" class="btn btn-danger">
            <i class="fas fa-plus"></i> Create New Badge
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for badge in badges %}
                    <tr>
                        <td>{{ badge.id }}</td>
                        <td class="fw-bold text-primary">{{ badge.title }}</td>
                        <td>{{ badge.description }}</td>
                        <td>
                            <a href="{{ url_for('edit_badge', badge_id=badge.id) }}" class="btn btn-sm btn-outline-dark">Edit</a>
                            <form action="{{ url_for('delete_badge', badge_id=badge.id) }}" method="POST" style="display: inline;">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to delete this badge?');">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center py-4 text-muted">No badges created yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
