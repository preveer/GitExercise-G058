{% extends "base.html" %}
{% block content %}
<div class="p-5 mb-4 bg-white rounded-3 shadow-sm text-center">
    <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold">Welcome to the Titan Arena</h1>
        <p class="fs-4">Your campus fitness journey starts here.</p>
        {% if not current_user.is_authenticated %}
            <a href="{{ url_for('register') }}" class="btn btn-danger btn-lg">Join the Titans</a>
        {% else %}
            <p>Welcome back, <strong>{{ current_user.name }}</strong>!</p>
            <a href="{{ url_for('list_events') }}" class="btn btn-primary btn-lg">Browse Events</a>
        {% endif %}
    </div>
</div>
{% endblock %}
