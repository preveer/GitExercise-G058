{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Leaderboard</h2>
        
        <form action="{{ url_for('leaderboard') }}" method="GET" class="d-flex">
            <select name="faculty" class="form-select me-2" onchange="this.form.submit()">
                <option value="">All Faculties</option>
                <option value="FCI" {% if selected_faculty == 'FCI' %}selected{% endif %}>FCI</option>
                <option value="FOE" {% if selected_faculty == 'FOE' %}selected{% endif %}>FOE</option>
                <option value="FOM" {% if selected_faculty == 'FOM' %}selected{% endif %}>FOM</option>
                <option value="FCM" {% if selected_faculty == 'FCM' %}selected{% endif %}>FCM</option>
            </select>
        </form>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Rank</th>
                        <th>User</th>
                        <th>Faculty</th>
                        <th>Points</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr {% if user == current_user %}class="table-warning"{% endif %}>
                        <td class="fw-bold">{{ loop.index }}</td>
                        <td>
                            <img src="{{ url_for('static', filename='profile_pics/' + user.profile_photo) }}" 
                                 class="rounded-circle me-2" style="width: 30px; height: 30px; object-fit: cover;">
                            {{ user.name }}
                        </td>
                        <td><span class="badge bg-secondary">{{ user.faculty }}</span></td>
                        <td class="fw-bold text-danger">{{ user.points }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="py-4 text-muted">No students found in this faculty.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
