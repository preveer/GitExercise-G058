{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2 class="fw-bold mb-4">Campus Sporting Events</h2>
    <div class="row">
        {% for event in events %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body">
                    <span class="badge bg-danger mb-2">{{ event.sport_type }}</span>
                    <h5 class="card-title fw-bold">{{ event.name }}</h5>
                    <p class="card-text text-muted">
                        <i class="bi bi-geo-alt"></i> {{ event.venue }}<br>
                        <i class="bi bi-calendar"></i> {{ event.date }} at {{ event.time }}
                    </p>
                    <form action="{{ url_for('rsvp', event_id=event.id) }}" method="POST">
                        <button type="submit" class="btn btn-outline-dark w-100">Join Event</button>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
